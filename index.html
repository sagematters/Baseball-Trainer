<title>Daily Trainer</title>
<style>
  :root{
    --bg:#FDFDFB; --card:#FFFFFF; --ink:#182119; --mut:#66716A;
    --grn:#2E5D3F; --grn-soft:#EDF3EE; --line:#E5E8E2; --amber:#8A6A2F; --amber-soft:#F5EFE2;
    --red:#9C3B2E;
  }
  @media (prefers-color-scheme: dark){:root{
    --bg:#121714; --card:#1A211C; --ink:#E7EBE6; --mut:#93A097;
    --grn:#7FB694; --grn-soft:#203026; --line:#2A332C; --amber:#D9B36A; --amber-soft:#332B1B; --red:#D97B6B;}}
  :root[data-theme="dark"]{
    --bg:#121714; --card:#1A211C; --ink:#E7EBE6; --mut:#93A097;
    --grn:#7FB694; --grn-soft:#203026; --line:#2A332C; --amber:#D9B36A; --amber-soft:#332B1B; --red:#D97B6B;}
  :root[data-theme="light"]{
    --bg:#FDFDFB; --card:#FFFFFF; --ink:#182119; --mut:#66716A;
    --grn:#2E5D3F; --grn-soft:#EDF3EE; --line:#E5E8E2; --amber:#8A6A2F; --amber-soft:#F5EFE2; --red:#9C3B2E;}
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,"SF Pro Text","Segoe UI",system-ui,sans-serif;
    font-size:17px;line-height:1.5}
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px 90px}
  h1{font-size:1.15rem;margin:0;font-weight:700}
  .date{color:var(--mut);font-size:.85rem}
  .goal{color:var(--mut);font-size:.95rem;margin:4px 0 0}
  header{padding:6px 2px 10px}

  /* tracker */
  .track{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:14px;
    display:flex;align-items:center;justify-content:space-between;gap:10px}
  .track .wk{display:flex;gap:7px}
  .track .d{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:.62rem;color:var(--mut)}
  .track .dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:.6rem}
  .track .dot.w{border-color:var(--grn);background:var(--grn);color:#fff}
  .track .dot.m{border-color:var(--grn)}
  .track .dot.wm{border-color:var(--amber);background:var(--grn);color:#fff}
  .track .streak{text-align:right;font-size:.78rem;color:var(--mut);line-height:1.3}
  .track .streak b{font-size:1.15rem;color:var(--grn);display:block;font-variant-numeric:tabular-nums}

  .pills{display:flex;gap:6px;overflow-x:auto;padding:2px;margin:0 -2px 12px}
  .pill{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--mut);
    border-radius:99px;padding:8px 14px;font-size:.9rem;font-weight:600;cursor:pointer}
  .pill.on{background:var(--grn);border-color:var(--grn);color:#fff}

  .row2{display:flex;gap:8px;margin-bottom:10px}
  select.loc{flex:1;appearance:none;-webkit-appearance:none;border:1px solid var(--line);border-radius:12px;
    background:var(--card);color:var(--ink);font:inherit;font-weight:700;padding:12px 14px;
    background-image:linear-gradient(45deg,transparent 50%,var(--mut) 50%),linear-gradient(135deg,var(--mut) 50%,transparent 50%);
    background-position:calc(100% - 20px) 55%,calc(100% - 14px) 55%;background-size:6px 6px;background-repeat:no-repeat}
  .seg{display:flex;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--card)}
  .seg.grow{flex:1.3}
  .seg button{flex:1;border:0;background:transparent;color:var(--mut);font:inherit;font-weight:600;
    padding:12px 4px;cursor:pointer;font-size:.9rem}
  .seg button.on{background:var(--grn-soft);color:var(--grn)}
  .lenrow{display:flex;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--card);margin-bottom:14px}
  .lenrow button{flex:1;border:0;background:transparent;color:var(--mut);font:inherit;font-weight:600;padding:12px 0;cursor:pointer}
  .lenrow button.on{background:var(--grn);color:#fff}
  .lenrow button .t{display:block;font-size:.68rem;font-weight:500;opacity:.85}

  .lead{font-size:.74rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);font-weight:700;margin:16px 0 8px}
  .lead.main{color:var(--grn)}
  .ex{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:8px;overflow:hidden}
  .ex.bonus{border-style:dashed}
  .ex>button{width:100%;display:flex;justify-content:space-between;align-items:center;gap:10px;
    background:transparent;border:0;color:inherit;font:inherit;text-align:left;padding:14px 16px;cursor:pointer}
  .ex .nm{font-weight:600}
  .ex .rx{color:var(--grn);font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;font-size:.95rem}
  .ex .det{display:none;padding:0 16px 16px;border-top:1px solid var(--line)}
  .ex.open .det{display:block}
  .fig{display:flex;justify-content:center;gap:14px;padding:14px 0 4px;color:var(--grn);flex-wrap:wrap}
  .fig .fr{display:flex;flex-direction:column;align-items:center;gap:2px}
  .fig .fr span{font-size:.68rem;color:var(--mut);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
  .fig svg{width:118px;height:96px;stroke:currentColor;fill:none;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
  .g{margin:10px 0 0}
  .g b{display:block;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin-bottom:2px}
  .g p{margin:0;font-size:.95rem}
  .g ol{margin:2px 0 0;padding-left:20px;font-size:.95rem}
  .g ol li{margin-bottom:5px}
  .meta{color:var(--mut);font-size:.85rem;margin-top:10px}
  a.demo{display:inline-block;margin-top:12px;color:var(--grn);font-weight:700;text-decoration:none;font-size:.92rem}

  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin:14px 0}
  .card h2{font-size:1rem;margin:0 0 6px}
  .card p{margin:6px 0;font-size:.95rem}
  .card ul{margin:6px 0;padding-left:20px;font-size:.95rem}
  .big{display:block;width:100%;border:0;border-radius:14px;background:var(--grn);color:#fff;
    font:inherit;font-weight:700;font-size:1.05rem;padding:16px;cursor:pointer;margin-top:10px}
  .big.done{background:var(--grn-soft);color:var(--grn);border:2px solid var(--grn)}
  .linkish{background:none;border:0;color:var(--grn);font:inherit;font-weight:600;padding:8px 0;cursor:pointer}
  .steps{font-size:.9rem;color:var(--mut)}
  .steps>div{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line)}
  .steps>div:last-child{border-bottom:0}

  /* nutrition */
  .totals{display:flex;gap:10px;margin:8px 0 4px}
  .tot{flex:1;background:var(--grn-soft);border-radius:12px;padding:10px 12px;text-align:center}
  .tot b{display:block;font-size:1.25rem;font-variant-numeric:tabular-nums;color:var(--grn)}
  .tot span{font-size:.72rem;color:var(--mut);letter-spacing:.05em;text-transform:uppercase;font-weight:700}
  .meals{display:flex;gap:6px;margin:10px 0}
  .meals button{flex:1;border:1px solid var(--line);background:var(--card);color:var(--mut);border-radius:10px;
    padding:10px 0;font:inherit;font-weight:600;font-size:.85rem;cursor:pointer}
  .meals button.on{border-color:var(--grn);color:var(--grn);background:var(--grn-soft)}
  .addrow{display:flex;gap:6px;margin-top:8px}
  .addrow select,.addrow input{border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink);
    font:inherit;padding:10px}
  .addrow select{flex:1;min-width:0}
  .addrow input{width:64px;text-align:center}
  .addrow button{border:0;border-radius:10px;background:var(--grn);color:#fff;font:inherit;font-weight:700;padding:0 16px;cursor:pointer}
  .custom{display:none;gap:6px;margin-top:8px}
  .custom.show{display:flex}
  .custom input{border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink);font:inherit;padding:10px}
  .custom .cn{flex:1;min-width:0}.custom .cc,.custom .cp{width:70px;text-align:center}
  .foodlist{margin-top:10px;font-size:.92rem}
  .foodlist .fi{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--line)}
  .foodlist .fi:last-child{border-bottom:0}
  .foodlist .fm{color:var(--mut);font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;margin-right:6px}
  .foodlist .fnum{color:var(--mut);font-variant-numeric:tabular-nums;font-size:.85rem;white-space:nowrap}
  .foodlist .del{border:0;background:none;color:var(--red);font-size:1.1rem;cursor:pointer;padding:2px 6px}

  /* player */
  #player{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;z-index:50;
    padding:20px 20px calc(20px + env(safe-area-inset-bottom))}
  #player.on{display:flex}
  #player .top{display:flex;justify-content:space-between;align-items:center;color:var(--mut);font-size:.9rem}
  #pbar{height:5px;background:var(--line);border-radius:99px;margin:12px 0;overflow:hidden}
  #pbarF{height:100%;background:var(--grn);width:0%}
  #player .mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:0;overflow-y:auto}
  #pfig{color:var(--grn);display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
  #pfig .fr{display:flex;flex-direction:column;align-items:center;gap:2px}
  #pfig .fr span{font-size:.7rem;color:var(--mut);font-weight:700;letter-spacing:.05em;text-transform:uppercase}
  #pfig svg{width:132px;height:104px;stroke:currentColor;fill:none;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
  #pname{font-size:1.4rem;font-weight:700;margin:6px 0 2px;text-wrap:balance}
  #ptype{font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;color:var(--grn);font-weight:700}
  #ptype.ready{color:var(--amber)}
  #pcue{color:var(--mut);max-width:36ch;margin:8px auto 0;font-size:.95rem}
  #pcue ol{text-align:left;margin:4px 0 0;padding-left:20px}
  #pcue ol li{margin-bottom:3px}
  #ptime{font-size:4rem;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;margin-top:12px}
  #ptime.ready{color:var(--amber)}
  #pnext{color:var(--mut);font-size:.9rem;margin-top:10px}
  #player .btns{display:flex;gap:10px;margin-top:16px}
  #player .btns button{flex:1;border:1px solid var(--line);background:var(--card);color:var(--ink);
    font:inherit;font-weight:700;border-radius:14px;padding:16px 0;cursor:pointer;font-size:1rem}
  #player .btns .go{background:var(--grn);border-color:var(--grn);color:#fff;flex:1.6}
  #flash{position:fixed;inset:0;background:var(--grn);opacity:0;pointer-events:none;z-index:60;transition:opacity .18s}
  #flash.on{opacity:.35}
  @media (prefers-reduced-motion: reduce){#flash{transition:none}}
  button:focus-visible,select:focus-visible,input:focus-visible{outline:3px solid var(--grn);outline-offset:2px}
</style>

<div class="wrap">
  <header>
    <div class="date" id="hdate"></div>
    <h1 id="hday"></h1>
    <p class="goal" id="hgoal"></p>
  </header>

  <div class="track" id="track"></div>
  <div class="pills" id="daypills"></div>
  <div id="controls"></div>
  <div id="content"></div>
</div>

<div id="player">
  <div class="top"><span id="pcount"></span><button class="linkish" onclick="endFlow(false)">Exit</button></div>
  <div id="pbar"><div id="pbarF"></div></div>
  <div class="mid">
    <span id="ptype"></span>
    <div id="pfig"></div>
    <div id="pname"></div>
    <div id="pcue"></div>
    <div id="ptime"></div>
    <div id="pnext"></div>
  </div>
  <div class="btns">
    <button onclick="stepBack()">‹ Back</button>
    <button class="go" id="pausebtn" onclick="togglePause()">Pause</button>
    <button onclick="stepSkip()">Skip ›</button>
  </div>
</div>
<div id="flash"></div>

/* ================= mobility flow ================= */
/* tier 1 = Short (~10 min) · tier 2 also in Medium (~16) · tier 3 only in Long (~23) */
var FLOW = [
  {k:'breath',n:'Standing breath + arm float',t:'flow',d:60,tier:1,frames:[['stand','Exhale down'],['armsup','Inhale up']],
   c:'Arms float up as you breathe in, sink as you breathe out. Slow, like moving through water.',
   steps:['Stand with feet directly under your hips, knees soft (not locked).','As you breathe IN through your nose for 4 seconds, let your arms float up in front of you to shoulder height, palms down.','As you breathe OUT slowly for 6-8 seconds, let the arms sink back down like they are resting on water.','Repeat the whole time. Each exhale, feel your shoulders and belly un-clench a little more.']},

   steps:['Get on hands and knees. Keeping the knee bent, lift your right knee slightly and draw the biggest SLOW circle you can with it — 5 circles forward, 5 backward. Switch legs.','Now step your right foot forward next to your right hand (a low lunge with the back knee down).','Keeping the front heel flat, rock your front knee forward over your toes and back, 8 slow times. Switch sides.']},

   steps:['Stand with feet wider than shoulders (about 1.5x), toes pointed slightly out.','Bend both knees and sink your hips straight down a few inches — like a fielding-ready position. Chest stays tall.','Slowly shift ALL of your weight over your right foot: the right knee bends more while the left leg straightens. Take 3 full seconds to get there.','Pause 1 second, then pour slowly across to the left side the same way. Keep your hips at the same low height the whole time — do not bob up and down.']},

   c:'Rotate from the wide stance into a front-lunge line, sink, and come back through the middle.',
   steps:['Start in your wide horse stance from the last move.','Turn your whole body to face right: pivot on your heels so your right leg becomes a FRONT lunge leg (knee bent over the foot) and your left leg is nearly straight behind you.','Sink an inch deeper into the front leg for one breath — arms reach gently forward like finishing a throw.','Rotate back through center to the horse stance, then repeat to the LEFT. Keep alternating, slow and smooth, no stopping.']},

   steps:['Step your right foot far forward into a long lunge; back leg reaches behind you, back knee hovering just off the floor (put it down if you need a break).','Put both hands on your front thigh, chest tall.','Tuck your tailbone slightly (like tucking your shirt in behind), then let your hips sink down-and-forward one inch as you exhale. Ease back up half an inch as you inhale.','Keep pulsing slowly with your breath. Switch legs halfway through the timer.']},
  {k:'couchL',n:'Couch stretch — LEFT hip',t:'hold',d:90,tier:1,frames:[['kneelwall','Foot up the wall'],['couch','Hips fwd, ribs down']],
   c:'Squeeze the back glute, ribs down. 6/10 stretch, never sharp.',
   steps:['Kneel facing AWAY from a wall or couch. Put your LEFT knee on the floor close to the wall, and slide your left shin and foot UP the wall behind you (toes pointing up).','Step your RIGHT foot flat on the floor in front of you.','Now the money move: squeeze your LEFT butt cheek and gently push your hips forward — do NOT arch your lower back. Keep your ribs pulled down like you are bracing for a poke.','Hands on the front knee or the floor, whichever lets you stay tall. Breathe slow. You should feel the front of the LEFT hip and thigh at a 6/10 stretch — never sharp pain.']},

  {k:'couchR',n:'Couch stretch — RIGHT hip',t:'hold',d:90,tier:1,frames:[['kneelwall','Foot up the wall'],['couch','Hips fwd, ribs down']],
   c:'Same as the left: back glute on, ribs down, 6/10 stretch.',
   steps:['Switch sides: RIGHT knee close to the wall, right shin up the wall, LEFT foot flat in front.','Squeeze the RIGHT glute, tuck the ribs down, hips gently forward.','Long slow exhales. Every exhale, see if the hip gives you one more millimeter for free — never force it.']},
  {k:'addL',n:'Deep lunge + groin lean — LEFT',t:'hold',d:60,tier:2,frames:[['wgs','Low lunge'],['lungeadd','Shift hips toward front leg']],

  {k:'addR',n:'Deep lunge + groin lean — RIGHT',t:'hold',d:60,tier:2,frames:[['wgs','Low lunge'],['lungeadd','Shift hips toward front leg']],
   c:'Switch sides. Slow breaths into the inner thigh.',

  {k:'frog',n:'Frog rocks',t:'flow',d:60,tier:3,frames:[['frog','Knees wide'],['frogback','Rock hips back']],
   c:'Knees wide, rock the hips back toward the heels and forward. Never force.',
   steps:['On all fours, spread your knees as wide as comfortable. Turn your feet outward so the INSIDE edges of your feet rest on the floor, shins parallel.','Lower to your forearms if you can.','Slowly rock your hips straight BACK toward your heels until the groin says 6/10, then rock forward again. One rock every 3-4 seconds.','Keep your back flat — the movement is hips only.']},
  {k:'nnswitch',n:'90/90 slow switches',t:'flow',d:60,tier:3,frames:[['ninety','One side'],['ninety','Sweep knees to other side']],

   steps:['Sit on the floor. Bend your RIGHT leg in FRONT of you at 90° (shin across your body) and your LEFT leg to the SIDE at 90° (shin behind you). This is the 90/90 position.','Sit as tall as you can — imagine a string pulling the top of your head up.','Keeping both feet roughly where they are, lift both knees together and sweep them over to the other side, so the LEFT leg is now in front. Slow — take 3 seconds per switch.','Keep switching sides with control. Hands can rest lightly on the floor behind you.']},
  {k:'nnL',n:'90/90 hold — LEFT leg front',t:'hold',d:60,tier:2,frames:[['ninety','Sit tall'],['ninetylean','Lean chest over shin']],

   steps:['Settle into 90/90 with the LEFT leg in front (left shin sideways across your body), right leg out to the side.','Sit tall first. Then hinge your whole flat chest FORWARD over the middle of the left shin — reach the chest out, not the head down.','You should feel it in the OUTSIDE of the left hip and deep in the glute, 6/10.','Hold and breathe. If you tip over, put your hands on the floor in front of the shin.']},

  {k:'ankleL',n:'Wall ankle hold — LEFT',t:'hold',d:60,tier:1,frames:[['ankle','Toes near wall'],['ankle','Drive knee to wall']],

   steps:['Face a wall. Put your LEFT foot flat on the floor with the toes about 4 inches (a hand-width) from the wall. Right leg steps back for balance.','Keeping the LEFT heel pressed hard into the floor, drive your left KNEE straight forward until it touches (or reaches toward) the wall.','If the knee touches easily, scoot the foot back an inch. If the heel pops up, move it closer.','Hold at the deepest point where the heel STAYS down. You will feel a stretch low in the calf and the front of the ankle.']},

  {k:'deepsquat',n:'Supported deep squat',t:'hold',d:90,tier:1,frames:[['stand','Hold support'],['deep','Sink, heels flat']],

/* ================= tracker ================= */
function renderTrack(){
  var L=getLog(),html='<div class="wk">',now=new Date();
  for(var i=6;i>=0;i--){
    var d=new Date(now);d.setDate(now.getDate()-i);
    var k=d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);
    var r=L[k]||{},cls=r.w&&r.m?'wm':r.w?'w':r.m?'m':'';
    var mark=r.w&&r.m?'✓':r.w?'W':r.m?'M':'';
    html+='<div class="d"><div class="dot '+cls+'">'+mark+'</div>'+'SMTWTFS'.charAt(d.getDay())+'</div>';
  }
  html+='</div>';
  var streak=0,c=new Date(now);
  while(true){
    var k2=c.getFullYear()+'-'+('0'+(c.getMonth()+1)).slice(-2)+'-'+('0'+c.getDate()).slice(-2);
    var r2=L[k2]||{};
    if(r2.w||r2.m){streak++;c.setDate(c.getDate()-1);}
    else{if(streak===0&&k2===todayKey()){c.setDate(c.getDate()-1);var k3=c.getFullYear()+'-'+('0'+(c.getMonth()+1)).slice(-2)+'-'+('0'+c.getDate()).slice(-2);var r3=L[k3]||{};if(r3.w||r3.m){c.setDate(c.getDate()+0);continue}}break}
  }
  html+='<div class="streak"><b>'+streak+'</b>day streak</div>';
  $('track').innerHTML=html;
}

    '<span class="rx">'+item.rx+'</span></button>'+
    '<div class="det"><div class="fig">'+figs+'</div>'+
    '<div class="g"><b>Set up</b><p>'+e.s+'</p></div>'+

function wireNutri(){
  var sel=$('foodsel');if(!sel)return;
  sel.onchange=function(){$('customrow').className='custom'+(sel.value==='other'?' show':'')};

function setMeal(m){state.meal=m;render();}
function addFood(){
  var sel=$('foodsel'),q=parseFloat($('foodqty').value)||1;
  var L=getLog(),r=dayRec(L,todayKey());
  if(sel.value==='other'){
    var n=$('cn').value.trim(),c=parseFloat($('cc').value)||0,p=parseFloat($('cp').value)||0;
    if(!n)return;
    r.food.push({n:n,c:c,p:p,q:q,m:state.meal});
  }else if(sel.value!==''){
    var f=FOODS[parseInt(sel.value,10)];
    r.food.push({n:f.n,c:f.c,p:f.p,q:q,m:state.meal});
  }else{return}
  saveLog(L);render();
}
function delFood(i){var L=getLog(),r=dayRec(L,todayKey());r.food.splice(i,1);saveLog(L);render();}

    '<div class="card"><h2>Today</h2><ul>'+
    '<li>The mobility flow below — done slow, this is the best one of the week.</li>'+
    '<li>A 20-30 min easy walk.</li>'+
    '<li>Optional: 10 relaxed shadow swings, feel the rhythm.</li>'+
    '<li>Sleep 8-9 hours tonight — that is where this week gets banked.</li></ul></div>'+
    flowCard()+nutriCard();

}

/* ================= flow player ================= */
var READY=12;
var P={list:[],i:0,left:0,mode:'ready',timer:null,paused:false,ctx:null};
function beep(n){
  try{
    if(!P.ctx)P.ctx=new (window.AudioContext||window.webkitAudioContext)();
    var t=P.ctx.currentTime;
    for(var k=0;k<n;k++){
      var o=P.ctx.createOscillator(),g=P.ctx.createGain();
      o.frequency.value=880;o.connect(g);g.connect(P.ctx.destination);
      g.gain.setValueAtTime(0.0001,t+k*0.25);g.gain.exponentialRampToValueAtTime(0.3,t+k*0.25+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+k*0.25+0.18);
      o.start(t+k*0.25);o.stop(t+k*0.25+0.2);
    }
  }catch(e){}
  var f=$('flash');f.classList.add('on');setTimeout(function(){f.classList.remove('on')},220);
}
function startFlow(){
  P.list=flowSteps();P.i=0;P.mode='ready';P.paused=false;
  $('player').classList.add('on');beep(1);loadStep();
}
function loadStep(){
  var s=P.list[P.i];
  P.left=P.mode==='ready'?READY:s.d;
  $('pcount').textContent=(P.i+1)+' of '+P.list.length;
  var frames=s.frames.map(function(fr){return '<div class="fr">'+svgOf(fr[0])+'<span>'+fr[1]+'</span></div>'}).join('');
  $('pfig').innerHTML=frames;
  $('pname').textContent=s.n;
  if(P.mode==='ready'){
    $('ptype').textContent='Get ready';$('ptype').className='ready';
    $('pcue').innerHTML='<ol>'+s.steps.slice(0,3).map(function(st){return '<li>'+st+'</li>'}).join('')+'</ol>';
    $('ptime').className='ready';
  }else{
    $('ptype').textContent=s.t==='hold'?'Long hold — breathe':s.t==='breathe'?'Down-regulate':'Keep moving';
    $('ptype').className='';
    $('pcue').textContent=s.c;
    $('ptime').className='';
  }
  $('pnext').textContent=P.i+1<P.list.length?'Next: '+P.list[P.i+1].n:'Last one — finish strong';
  drawTime();updateBar();
  clearInterval(P.timer);P.timer=setInterval(tick,1000);
}
function tick(){
  if(P.paused)return;
  P.left--;drawTime();updateBar();
  if(P.left<=0){
    if(P.mode==='ready'){P.mode='work';beep(2);loadStep();return;}
    if(P.i+1>=P.list.length){finishFlow();return;}
    P.i++;P.mode='ready';beep(1);loadStep();
  }
}
function drawTime(){var m=Math.floor(P.left/60),s=P.left%60;$('ptime').textContent=(m>0?m+':'+('0'+s).slice(-2):s);}
function updateBar(){
  var per=READY,done=0,total=0;
  P.list.forEach(function(s,idx){total+=s.d+per;if(idx<P.i)done+=s.d+per;});
  done+= P.mode==='ready'?(READY-P.left):(READY+P.list[P.i].d-P.left);
  $('pbarF').style.width=(100*done/total)+'%';
}
function togglePause(){P.paused=!P.paused;$('pausebtn').textContent=P.paused?'Resume':'Pause';}
function stepBack(){
  if(P.mode==='work'){P.mode='ready';loadStep();}
  else if(P.i>0){P.i--;P.mode='ready';loadStep();}
  beep(1);
}
function stepSkip(){
  if(P.mode==='ready'){P.mode='work';loadStep();beep(2);return;}
  if(P.i+1>=P.list.length){finishFlow();return;}
  P.i++;P.mode='ready';beep(1);loadStep();
}
function finishFlow(){
  beep(3);
  var L=getLog(),r=dayRec(L,todayKey());r.m=1;saveLog(L);
  endFlow(true);
}
function endFlow(){clearInterval(P.timer);$('player').classList.remove('on');$('pausebtn').textContent='Pause';render();}

render();
</script>
