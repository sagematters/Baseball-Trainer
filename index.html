<title>Daily Trainer — Vacation Bridge</title>
<style>
  :root{
    --bg:#FDFDFB; --card:#FFFFFF; --ink:#182119; --mut:#66716A;
    --grn:#2E5D3F; --grn-soft:#EDF3EE; --line:#E5E8E2; --amber:#8A6A2F; --amber-soft:#F5EFE2;
  }
  @media (prefers-color-scheme: dark){:root{
    --bg:#121714; --card:#1A211C; --ink:#E7EBE6; --mut:#93A097;
    --grn:#7FB694; --grn-soft:#203026; --line:#2A332C; --amber:#D9B36A; --amber-soft:#332B1B;}}
  :root[data-theme="dark"]{
    --bg:#121714; --card:#1A211C; --ink:#E7EBE6; --mut:#93A097;
    --grn:#7FB694; --grn-soft:#203026; --line:#2A332C; --amber:#D9B36A; --amber-soft:#332B1B;}
  :root[data-theme="light"]{
    --bg:#FDFDFB; --card:#FFFFFF; --ink:#182119; --mut:#66716A;
    --grn:#2E5D3F; --grn-soft:#EDF3EE; --line:#E5E8E2; --amber:#8A6A2F; --amber-soft:#F5EFE2;}
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,"SF Pro Text","Segoe UI",system-ui,sans-serif;
    font-size:17px;line-height:1.5}
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px 90px}
  h1{font-size:1.05rem;margin:0;font-weight:700;letter-spacing:.01em}
  .date{color:var(--mut);font-size:.85rem}
  .goal{color:var(--mut);font-size:.95rem;margin:4px 0 0}
  header{padding:6px 2px 14px}

  .pills{display:flex;gap:6px;overflow-x:auto;padding:2px;margin:0 -2px 14px}
  .pill{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--mut);
    border-radius:99px;padding:8px 14px;font-size:.9rem;font-weight:600;cursor:pointer}
  .pill.on{background:var(--grn);border-color:var(--grn);color:#fff}
  :root[data-theme="dark"] .pill.on, .dk .pill.on{color:#10160f}

  .seg{display:flex;border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:10px;background:var(--card)}
  .seg button{flex:1;border:0;background:transparent;color:var(--mut);font:inherit;font-weight:600;
    padding:12px 0;cursor:pointer}
  .seg button.on{background:var(--grn-soft);color:var(--grn)}

  .feels{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .feel{border:1px solid var(--line);background:var(--card);color:var(--mut);border-radius:10px;
    padding:9px 12px;font-size:.85rem;font-weight:600;cursor:pointer}
  .feel.on{border-color:var(--grn);color:var(--grn);background:var(--grn-soft)}

  .banner{background:var(--amber-soft);color:var(--amber);border-radius:12px;padding:12px 14px;
    font-size:.92rem;margin-bottom:14px;font-weight:500}

  .block{margin-bottom:18px}
  .block>h2{font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--grn);
    margin:0 0 8px;font-weight:700}
  .block>h2 .opt{color:var(--mut);font-weight:600;letter-spacing:.04em;text-transform:none}
  .ex{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:8px;overflow:hidden}
  .ex>button{width:100%;display:flex;justify-content:space-between;align-items:center;gap:10px;
    background:transparent;border:0;color:inherit;font:inherit;text-align:left;padding:14px 16px;cursor:pointer}
  .ex .nm{font-weight:600}
  .ex .rx{color:var(--grn);font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;font-size:.95rem}
  .ex .det{display:none;padding:0 16px 16px;border-top:1px solid var(--line)}
  .ex.open .det{display:block}
  .fig{display:flex;justify-content:center;padding:14px 0 6px;color:var(--grn)}
  .fig svg{width:150px;height:120px;stroke:currentColor;fill:none;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
  .g{margin:10px 0 0}
  .g b{display:block;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin-bottom:2px}
  .g p{margin:0;font-size:.95rem}
  .meta{color:var(--mut);font-size:.85rem;margin-top:10px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:18px}
  .card h2{font-size:1rem;margin:0 0 6px}
  .card p{margin:6px 0;font-size:.95rem}
  .card ul{margin:6px 0;padding-left:20px;font-size:.95rem}
  .card li{margin-bottom:4px}
  .big{display:block;width:100%;border:0;border-radius:14px;background:var(--grn);color:#fff;
    font:inherit;font-weight:700;font-size:1.05rem;padding:16px;cursor:pointer;margin-top:10px}
  :root[data-theme="dark"] .big{color:#10160f}
  .linkish{background:none;border:0;color:var(--grn);font:inherit;font-weight:600;padding:8px 0;cursor:pointer}

  /* player */
  #player{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;z-index:50;
    padding:20px 20px calc(20px + env(safe-area-inset-bottom))}
  #player.on{display:flex}
  #player .top{display:flex;justify-content:space-between;align-items:center;color:var(--mut);font-size:.9rem}
  #pbar{height:5px;background:var(--line);border-radius:99px;margin:12px 0;overflow:hidden}
  #pbarF{height:100%;background:var(--grn);width:0%}
  #player .mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:0}
  #pfig{color:var(--grn)}
  #pfig svg{width:190px;height:150px;stroke:currentColor;fill:none;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
  #pname{font-size:1.5rem;font-weight:700;margin:6px 0 2px;text-wrap:balance}
  #ptype{font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;color:var(--grn);font-weight:700}
  #pcue{color:var(--mut);max-width:34ch;margin:8px auto 0;font-size:.98rem}
  #ptime{font-size:4.4rem;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;margin-top:14px}
  #pnext{color:var(--mut);font-size:.9rem;margin-top:10px}
  #player .btns{display:flex;gap:10px;margin-top:16px}
  #player .btns button{flex:1;border:1px solid var(--line);background:var(--card);color:var(--ink);
    font:inherit;font-weight:700;border-radius:14px;padding:16px 0;cursor:pointer;font-size:1rem}
  #player .btns .go{background:var(--grn);border-color:var(--grn);color:#fff;flex:1.6}
  :root[data-theme="dark"] #player .btns .go{color:#10160f}
  #flash{position:fixed;inset:0;background:var(--grn);opacity:0;pointer-events:none;z-index:60;transition:opacity .18s}
  #flash.on{opacity:.35}
  @media (prefers-reduced-motion: reduce){#flash{transition:none}}
  button:focus-visible{outline:3px solid var(--grn);outline-offset:2px}
  .steps{font-size:.9rem;color:var(--mut)}
  .steps div{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line)}
  .steps div:last-child{border-bottom:0}
</style>

<div class="wrap">
  <header>
    <div class="date" id="hdate"></div>
    <h1 id="hday"></h1>
    <p class="goal" id="hgoal"></p>
  </header>

  <div class="pills" id="daypills"></div>
  <div class="seg" id="locseg"></div>
  <div class="feels" id="feels"></div>
  <div id="banner"></div>
  <div id="content"></div>
</div>

<div id="player">
  <div class="top"><span id="pcount"></span><button class="linkish" onclick="endFlow()">Exit</button></div>
  <div id="pbar"><div id="pbarF"></div></div>
  <div class="mid">
    <span id="ptype"></span>
    <div id="pfig"></div>
    <div id="pname"></div>
    <p id="pcue"></p>
    <div id="ptime"></div>
    <div id="pnext"></div>
  </div>
  <div class="btns">
    <button onclick="stepBack()">‹ Back</button>
    <button class="go" id="pausebtn" onclick="togglePause()">Pause</button>
    <button onclick="stepSkip()">Skip ›</button>
  </div>
</div>
<div id="flash"></div>

var state = {day: new Date().getDay(), loc:null, feel:'normal'};
function defLoc(d){return d===3?'field':'home'}
state.loc = defLoc(state.day);

var DAYN = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var $ = function(id){return document.getElementById(id)};

function svg(fig){return '<svg viewBox="0 0 120 100" aria-hidden="true">'+ (FIGS[fig]||'') +'</svg>'}

function render(){
  var d = state.day, plan = DAYS[d];
  var today = new Date();
  $('hdate').textContent = today.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'}) + (d===today.getDay()?'':' · viewing '+DAYN[d]);
  // day pills
  var ph='';
  for(var i=1;i<=7;i++){var idx=i%7;
    ph+='<button class="pill'+(idx===d?' on':'')+'" onclick="setDay('+idx+')">'+DAYN[idx].slice(0,3)+'</button>';}
  $('daypills').innerHTML=ph;

  if(!plan){ renderRest(); return; }

  $('hday').textContent = plan.t;
  $('hgoal').textContent = plan.g;

  var ls='';['home','gym','field'].forEach(function(L){
    ls+='<button class="'+(state.loc===L?'on':'')+'" onclick="setLoc(\''+L+'\')">'+L[0].toUpperCase()+L.slice(1)+'</button>';});
  $('locseg').innerHTML=ls; $('locseg').style.display='flex';

  var feels=[['normal','Normal day'],['hips','Hips tired'],['strong','Feeling strong'],['low','Low energy'],['time','Short on time']];
  var fh='';feels.forEach(function(f){fh+='<button class="feel'+(state.feel===f[0]?' on':'')+'" onclick="setFeel(\''+f[0]+'\')">'+f[1]+'</button>';});
  $('feels').innerHTML=fh; $('feels').style.display='flex';

  $('banner').innerHTML = FEELNOTES[state.feel]? '<div class="banner">'+FEELNOTES[state.feel]+'</div>' : '';

  var blocks = plan.loc[state.loc].map(function(b){return {n:b.n, items:b.items.slice()}});
  if(state.feel==='hips'){
    blocks.forEach(function(b){ b.items=b.items.map(function(item){
      var e=EX[item.x];
      if(e && e.tags && e.tags.indexOf('hip')>-1 && e.alt){return {x:e.alt, rx:item.rx.replace(/\d+×/,'2×'), rest:item.rest, swapped:true};}
      return item;});});
  }
  var html='';
  blocks.forEach(function(b){
    html+='<div class="block"><h2>'+b.n+(/Optional/i.test(b.n)?'':'')+'</h2>';
    b.items.forEach(function(item){ html+=exCard(item); });
    html+='</div>';
  });
  if(plan.bonus){
    html+='<div class="block"><h2>'+plan.bonus.n+' <span class="opt">· optional</span></h2>';
    plan.bonus.items.forEach(function(item){ html+=exCard(item); });
    html+='</div>';
  }
  if(plan.arm){
    html+='<div class="card"><h2>🧢 Driveline arm care</h2><p>Run your Driveline program today (and any day you throw). This plan leaves your arm work to it on purpose — do not double up with extra shoulder stuff.</p></div>';
  }
  html+= flowCard() + nutriCard();
  $('content').innerHTML=html;
}

function exCard(item){
  var e=EX[item.x]; if(!e) return '';
  var id='x'+Math.random().toString(36).slice(2,8);
  return '<div class="ex" id="'+id+'"><button onclick="tog(\''+id+'\')" aria-expanded="false">'+
    '<span class="nm">'+e.n+(item.swapped?' <span style="color:var(--amber)">· swapped for your hips</span>':'')+'</span>'+
    '<span class="rx">'+item.rx+'</span></button>'+
    '<div class="det"><div class="fig">'+svg(e.fig)+'</div>'+
    '<div class="g"><b>Set up</b><p>'+e.s+'</p></div>'+
    '<div class="g"><b>How to do it</b><p>'+e.e+'</p></div>'+
    '<div class="g"><b>It should feel like</b><p>'+e.f+'</p></div>'+
    '<div class="g"><b>Most common mistake</b><p>'+e.m+'</p></div>'+
    (item.rest?'<div class="meta">Rest: '+item.rest+'</div>':'')+
    '</div></div>';
}

function flowCard(){
  var total=Math.round(FLOW.reduce(function(a,s){return a+s.d},0)/60);
  var steps=FLOW.map(function(s){return '<div><span>'+s.n+'</span><span>'+(s.d>=60? Math.floor(s.d/60)+':'+('0'+s.d%60).slice(-2) : s.d+'s')+'</span></div>'}).join('');
  return '<div class="card"><h2>🧘 Daily mobility flow · '+total+' min</h2>'+
  '<p>Every day, no decisions: press start and follow it to the end. Beeps + a green flash move you to each next position automatically.</p>'+
  '<button class="big" onclick="startFlow()">▶ Start the flow</button>'+
  '<button class="linkish" onclick="var s=this.nextElementSibling;s.style.display=s.style.display===\'block\'?\'none\':\'block\'">See all '+FLOW.length+' steps</button>'+
  '<div class="steps" style="display:none">'+steps+'</div></div>';
}

function tog(id){var el=$(id);el.classList.toggle('open');el.querySelector('button').setAttribute('aria-expanded',el.classList.contains('open'));}
function setDay(d){state.day=d;state.loc=defLoc(d);state.feel='normal';render();window.scrollTo(0,0);}
function setLoc(l){state.loc=l;render();}
function setFeel(f){state.feel=f;render();}

/* ---------- flow player ---------- */
var P={i:0,left:0,timer:null,paused:false,ctx:null};
function beep(n){
  try{
    if(!P.ctx) P.ctx = new (window.AudioContext||window.webkitAudioContext)();
    var t=P.ctx.currentTime;
    for(var k=0;k<n;k++){
      var o=P.ctx.createOscillator(),g=P.ctx.createGain();
      o.frequency.value=880;o.connect(g);g.connect(P.ctx.destination);
      g.gain.setValueAtTime(0.0001,t+k*0.25);g.gain.exponentialRampToValueAtTime(0.3,t+k*0.25+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+k*0.25+0.18);
      o.start(t+k*0.25);o.stop(t+k*0.25+0.2);
    }
  }catch(e){}
  var f=$('flash');f.classList.add('on');setTimeout(function(){f.classList.remove('on')},220);
}
function startFlow(){P.i=0;P.paused=false;$('player').classList.add('on');beep(1);loadStep();}
function loadStep(){
  var s=FLOW[P.i];P.left=s.d;
  $('pcount').textContent=(P.i+1)+' of '+FLOW.length;
  $('ptype').textContent = s.t==='hold'?'Long hold — breathe':s.t==='breathe'?'Down-regulate':'Keep moving';
  $('pfig').innerHTML=svg(s.fig);
  $('pname').textContent=s.n;
  $('pcue').textContent=s.c;
  $('pnext').textContent = P.i+1<FLOW.length ? 'Next: '+FLOW[P.i+1].n : 'Last one — finish strong';
  drawTime();updateBar();
  clearInterval(P.timer);P.timer=setInterval(tick,1000);
}
function tick(){
  if(P.paused)return;
  P.left--;drawTime();updateBar();
  if(P.left<=0){
    if(P.i+1>=FLOW.length){beep(3);endFlow();return;}
    P.i++;beep(P.i%2===0?1:1);loadStep();
  } else if(P.left<=3){beep(0);/*silent tick*/}
}
function drawTime(){var m=Math.floor(P.left/60),s=P.left%60;$('ptime').textContent=(m>0? m+':'+('0'+s).slice(-2): s);}
function updateBar(){
  var done=0;for(var k=0;k<P.i;k++)done+=FLOW[k].d;done+=FLOW[P.i].d-P.left;
  var total=FLOW.reduce(function(a,s){return a+s.d},0);
  $('pbarF').style.width=(100*done/total)+'%';
}
function togglePause(){P.paused=!P.paused;$('pausebtn').textContent=P.paused?'Resume':'Pause';}
function stepBack(){if(P.left<FLOW[P.i].d-3){loadStep();}else if(P.i>0){P.i--;loadStep();}beep(1);}
function stepSkip(){if(P.i+1>=FLOW.length){beep(3);endFlow();return;}P.i++;beep(1);loadStep();}
function endFlow(){clearInterval(P.timer);$('player').classList.remove('on');$('pausebtn').textContent='Pause';}

render();
</script>
